<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가게 상세</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background-color: #f5f5f5;
        }

        img.menu-image {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-btn {
            padding: 8px 12px;
            border: none;
            background-color: black;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        #cartMessage {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }

        #errorMessage {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>
<a class="back-link" href="/stores.html">← 가게 목록으로 돌아가기</a>

<h1>가게 상세페이지</h1>
<p id="storeIdText"></p>

<table>
    <thead>
    <tr>
        <th>메뉴 사진</th>
        <th>메뉴명</th>
        <th>가격</th>
        <th>수량</th>
        <th>장바구니</th>
    </tr>
    </thead>
    <tbody id="menuTableBody">
    </tbody>
</table>

<p id="cartMessage"></p>
<p id="errorMessage"></p>

<script src="/js/store-detail.js"></script>
</body>
</html>
