<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배달 서비스 테스트</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .box {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 12px;
        }
        a.button {
            display: inline-block;
            padding: 12px 18px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>배달 서비스 테스트</h1>
    <p>Hello</p>
    <a class="button" href="/store">가게 목록 보러가기</a>
</div>
</body>
</html>
