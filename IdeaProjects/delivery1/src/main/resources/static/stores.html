<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가게 목록</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1, h2 {
            margin-bottom: 16px;
        }
        .store-list button {
            margin-right: 10px;
            margin-bottom: 10px;
            padding: 10px 14px;
            border: 1px solid #333;
            background: white;
            cursor: pointer;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background: #f5f5f5;
        }
        .order-btn {
            padding: 8px 12px;
            border: none;
            background: #222;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .result-box {
            margin-top: 24px;
            padding: 16px;
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 8px;
        }
        .top-link {
            display: inline-block;
            margin-bottom: 24px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <a class="top-link" href="/">← 메인으로</a>
    <h1>가게 목록</h1>

    <div id="storeList" class="store-list"></div>

    <h2 id="menuTitle">메뉴 목록</h2>
    <table>
        <thead>
        <tr>
            <th>메뉴 ID</th>
            <th>메뉴명</th>
            <th>가격</th>
            <th>주문</th>
        </tr>
        </thead>
        <tbody id="menuTableBody">
        <tr>
            <td colspan="4">가게를 선택해주세요.</td>
        </tr>
        </tbody>
    </table>

    <div class="result-box" id="orderResult">
        아직 주문이 없습니다.
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
